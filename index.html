<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cozy Scenes: Space Time</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #f5f2ec;
  font-family: system-ui, -apple-system, sans-serif;
}

/* CANVAS (unchanged) */
canvas {
  display: block;
  width: 100vw;
  height: 100vh;
  position: fixed;
  top: 0;
  left: 0;
}

/* ===== NEW UI LAYER ===== */
.ui {
  position: fixed;
  inset: 0;
  pointer-events: none;
}

/* shared pill style */
.pill {
  position: absolute;
  bottom: 14px;
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 10px;
  border-radius: 999px;

  background: #f7f1e8;
  border: 1.5px solid rgba(70, 55, 40, 0.55);
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.35);

  color: #4a3f35;
  line-height: 1;
}

/* LEFT: weather */
.weather {
  left: 14px;
  font-size: 11px;
  font-weight: 600;
  text-transform: lowercase;
}

/* RIGHT: temp */
.temp {
  right: 14px;
  font-size: 14px;
  font-weight: 700;
  justify-content: center;
  min-width: 80px;
}

/* icons */
.icon {
  width: 18px;
  height: 18px;
  flex: 0 0 18px;
}

.temp .icon {
  width: 20px;
  height: 20px;
}

/* subtle text tweak */
.label {
  transform: translateY(0.5px);
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<!-- ===== UI OVERLAY ===== -->
<div class="ui">
  <div class="pill weather">
    <span class="icon">
      <!-- cloud + sun -->
      <svg viewBox="0 0 24 24" width="100%" height="100%">
        <circle cx="8" cy="9" r="4" fill="#f6c64b"/>
        <path d="M9 18h8a3.5 3.5 0 0 0 0-7 5 5 0 0 0-9-1.5A4 4 0 0 0 9 18Z"
              fill="#f4eee7" stroke="#b59683" stroke-width="1"/>
      </svg>
    </span>
    <span class="label">partly cloudy</span>
  </div>

  <div class="pill temp">
    <span class="icon">
      <!-- sun -->
      <svg viewBox="0 0 24 24" width="100%" height="100%">
        <circle cx="12" cy="12" r="5" fill="#f6c64b"/>
      </svg>
    </span>
    <span>57°</span>
  </div>
</div>

<script>
(function () {

  function Rng(seed) {
    let s = seed >>> 0;
    return {
      next()     { s ^= s<<13; s ^= s>>>17; s ^= s<<5; return (s>>>0)/4294967296; },
      range(a,b) { return a + this.next()*(b-a); },
      int(a,b)   { return Math.floor(this.range(a, b+1)); },
      pick(arr)  { return arr[Math.floor(this.next()*arr.length)]; }
    };
  }

  const seed    = Date.now();
  const rng     = Rng(seed);
  const fontRng = Rng((seed * 2654435761) >>> 0);

  const FONTS = [
    { family: 'Bebas Neue', url: 'Bebas+Neue', weight: '400' },
    { family: 'Abril Fatface', url: 'Abril+Fatface', weight: '400' },
    { family: 'Bangers', url: 'Bangers', weight: '400' },
    { family: 'Pacifico', url: 'Pacifico', weight: '400' },
    { family: 'Ultra', url: 'Ultra', weight: '400' },
    { family: 'Alfa Slab One', url: 'Alfa+Slab+One', weight: '400' },
    { family: 'Lobster', url: 'Lobster', weight: '400' },
    { family: 'Press Start 2P', url: 'Press+Start+2P', weight: '400' },
    { family: 'Permanent Marker', url: 'Permanent+Marker', weight: '400' },
    { family: 'Cinzel', url: 'Cinzel:wght@900', weight: '900' },
    { family: 'Russo One', url: 'Russo+One', weight: '400' },
    { family: 'Boogaloo', url: 'Boogaloo', weight: '400' },
  ];

  const PALETTES = [
    { bg: '#f5f2ec', fg: '#1a1a1a', accent: '#8c8c8c' },
    { bg: '#e8e4dc', fg: '#2a2a2a', accent: '#aaa49a' },
    { bg: '#f0ece4', fg: '#111', accent: '#b0aba0' },
    { bg: '#d8d4cc', fg: '#222', accent: '#888' },
  ];

  const PATTERNS = ['checker','diamond','stripes_diag','dots','triangles','hexagons'];

  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const W = canvas.width;
  const H = canvas.height;

  const pal = rng.pick(PALETTES);
  const patType = rng.pick(PATTERNS);
  const tileSize = rng.pick([24, 32, 44, 56]);
  const rotation = rng.range(0, Math.PI * 2);

  const fontObj = fontRng.pick(FONTS);

  const params = new URLSearchParams(location.search);
  const offset = parseInt(params.get('offset')) || 0;
  const showIsh = true;

  const link = document.createElement('link');
  link.rel = 'stylesheet';
  link.href = 'https://fonts.googleapis.com/css2?family=' + fontObj.url + '&display=swap';
  document.head.appendChild(link);

  document.fonts.load(fontObj.weight + ' 40px ' + fontObj.family)
    .then(draw);

  function draw() {

    ctx.fillStyle = pal.bg;
    ctx.fillRect(0,0,W,H);

    const now = new Date(Date.now() + offset * 1000);

    let h = now.getHours();
    let m = String(now.getMinutes()).padStart(2,'0');

    const ampm = h >= 12 ? 'pm' : 'am';
    h = h % 12 || 12;

    const timeStr = h + ':' + m;
    const suffStr = ' ' + ampm + ' ish...';

    const fontSize = Math.min(W * 0.30, H * 0.44);
    ctx.font = fontSize + 'px ' + fontObj.family;
    ctx.fillStyle = pal.fg;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    ctx.fillText(timeStr, W/2, H/2);
  }

})();
</script>

</body>
</html>
