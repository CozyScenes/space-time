<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cozy Scenes: Space Time…ish</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #f5f2ec; }
  canvas { display: block; width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; }

  .ui { position: fixed; inset: 0; pointer-events: none; z-index: 10; }

  .pill {
    position: absolute;
    bottom: 14px;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 10px;
    border-radius: 999px;
    background: #f7f1e8;
    border: 1.5px solid rgba(70,55,40,0.55);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.35);
    color: #4a3f35;
    line-height: 1;
  }
  .weather { left: 14px; font-size: 11px; font-weight: 600; text-transform: lowercase; }
  .temp { right: 14px; font-size: 14px; font-weight: 700; justify-content: center; min-width: 70px; }
  .icon { width: 18px; height: 18px; flex: 0 0 18px; }
  .temp .icon { width: 20px; height: 20px; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div class="ui">
  <div class="pill weather" id="wx-pill" style="display:none;">
    <span class="icon" id="wx-icon"></span>
    <span id="wx-label"></span>
  </div>
  <div class="pill temp" id="temp-pill" style="display:none;">
    <span class="icon" id="temp-icon"></span>
    <span id="temp-label"></span>
  </div>
</div>

<script>
(function () {

  function Rng(seed) {
    let s = seed >>> 0;
    return {
      next()     { s ^= s<<13; s ^= s>>>17; s ^= s<<5; return (s>>>0)/4294967296; },
      range(a,b) { return a + this.next()*(b-a); },
      int(a,b)   { return Math.floor(this.range(a, b+1)); },
      pick(arr)  { return arr[Math.floor(this.next()*arr.length)]; }
    };
  }

  const seed    = Date.now();
  const rng     = Rng(seed);
  const fontRng = Rng((seed * 2654435761) >>> 0);

  const FONTS = [
    { family: 'Bebas Neue',       url: 'Bebas+Neue',       weight: '400' },
    { family: 'Abril Fatface',    url: 'Abril+Fatface',    weight: '400' },
    { family: 'Bangers',          url: 'Bangers',          weight: '400' },
    { family: 'Pacifico',         url: 'Pacifico',         weight: '400' },
    { family: 'Ultra',            url: 'Ultra',            weight: '400' },
    { family: 'Alfa Slab One',    url: 'Alfa+Slab+One',    weight: '400' },
    { family: 'Lobster',          url: 'Lobster',          weight: '400' },
    { family: 'Press Start 2P',   url: 'Press+Start+2P',   weight: '400' },
    { family: 'Permanent Marker', url: 'Permanent+Marker', weight: '400' },
    { family: 'Cinzel',           url: 'Cinzel:wght@900',  weight: '900' },
    { family: 'Russo One',        url: 'Russo+One',        weight: '400' },
    { family: 'Boogaloo',         url: 'Boogaloo',         weight: '400' },
  ];

  const PALETTES = [
    { bg: '#f5f2ec', fg: '#1a1a1a', accent: '#8c8c8c' },
    { bg: '#e8e4dc', fg: '#2a2a2a', accent: '#aaa49a' },
    { bg: '#f0ece4', fg: '#111',    accent: '#b0aba0'  },
    { bg: '#1c1c1c', fg: '#ede9e0', accent: '#666'     },
    { bg: '#2c2c2c', fg: '#e0dcd4', accent: '#888'     },
    { bg: '#d8d4cc', fg: '#222',    accent: '#888'     },
    { bg: '#f5f2ec', fg: '#555',    accent: '#bbb'     },
    { bg: '#111',    fg: '#ddd',    accent: '#555'     },
  ];

  const PATTERNS = [
    'checker','diamond','houndstooth','stripes_h','stripes_v',
    'stripes_diag','dots','triangles','hexagons','zigzag','cross','woven',
  ];

  const canvas = document.getElementById('c');
  const ctx    = canvas.getContext('2d');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  const W = canvas.width, H = canvas.height;

  const pal      = rng.pick(PALETTES);
  const patType  = rng.pick(PATTERNS);
  const tileSize = rng.pick([18, 24, 32, 44, 56, 72, 88]);
  const rotation = rng.range(0, Math.PI * 2);
  const useAccent = rng.next() > 0.6;
  const jitter    = rng.next() > 0.7;
  const borderW   = rng.next() > 0.6 ? rng.range(0.5, 2.0) : 0;
  const fontObj   = fontRng.pick(FONTS);

  const params  = new URLSearchParams(location.search);
  const offset  = parseInt(params.get('offset')) || 0;
  const showIsh = params.get('ish') === 'true' || params.get('ish') === '1';

  const link = document.createElement('link');
  link.rel  = 'stylesheet';
  link.href = 'https://fonts.googleapis.com/css2?family=' + fontObj.url + '&display=swap';
  document.head.appendChild(link);

  document.fonts.load(fontObj.weight + ' 40px \'' + fontObj.family + '\'')
    .then(draw).catch(draw);

  function draw() {
    ctx.fillStyle = pal.bg;
    ctx.fillRect(0, 0, W, H);

    var now   = new Date(Date.now() + offset * 1000);
    var hh    = now.getUTCHours();
    var mm    = String(now.getUTCMinutes()).padStart(2, '0');
    var ampm  = hh >= 12 ? 'pm' : 'am';
    var h12   = hh % 12 || 12;
    var timeStr = h12 + ':' + mm;

    var fontSize  = Math.min(W * 0.30, H * 0.44);
    var fam       = "'" + fontObj.family + "', Georgia, serif";
    var mainFont  = fontObj.weight + ' ' + fontSize + 'px ' + fam;
    var smallSize = fontSize * 0.24;
    var smallFont = fontObj.weight + ' ' + smallSize + 'px ' + fam;
    var ishSize   = fontSize * 0.18;
    var ishFont   = fontObj.weight + ' ' + ishSize + 'px ' + fam;

    var gap    = fontSize * 0.035;
    var centerY = H / 2;

    ctx.fillStyle = pal.fg;
    ctx.font = mainFont;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';

    var startX = W * 0.2;

    ctx.fillText(timeStr, startX, centerY);

    ctx.font = smallFont;
    ctx.textBaseline = 'top';
    ctx.fillText(ampm, startX + fontSize * 2.2, centerY - fontSize * 0.16);

    if (showIsh) {
      ctx.globalAlpha = 0.78;
      ctx.font = ishFont;
      ctx.fillText('…ish', startX + fontSize * 2.2, centerY + fontSize * 0.055);
      ctx.globalAlpha = 1;
    }
  }

})();
</script>
</body>
</html>
